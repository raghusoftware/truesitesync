name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  release:
    types: [created]

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp app.html www/index.html
          cp -r css www/
          cp -r js www/
          cp -r assets www/

      - name: Install Capacitor
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/filesystem@6 @capacitor/share@6 @capacitor/app@6 @capacitor/status-bar@6

      - name: Add Android platform
        run: npx cap add android

      - name: Target Android 15 (API 35)
        run: |
          sed -i -E 's/(compileSdkVersion = )[0-9]+/\135/' android/variables.gradle
          sed -i -E 's/(targetSdkVersion = )[0-9]+/\135/' android/variables.gradle
          echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
          echo "----- android/variables.gradle -----"; cat android/variables.gradle

      - name: Sync web assets
        run: npx cap sync android

      - name: Configure Android to keep links in-app
        run: |
          # Override AndroidManifest to handle all links inside WebView
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Add internet permission and usesCleartextTraffic
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"

          # Create custom WebView client to prevent opening Chrome
          mkdir -p android/app/src/main/java/com/truesitesync/app
          cat > android/app/src/main/java/com/truesitesync/app/MainActivity.java << 'JAVAEOF'
          package com.truesitesync.app;

          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }

              @Override
              public void onStart() {
                  super.onStart();
                  WebView webView = getBridge().getWebView();
                  if (webView != null) {
                      WebSettings settings = webView.getSettings();
                      settings.setJavaScriptEnabled(true);
                      settings.setDomStorageEnabled(true);
                      settings.setDatabaseEnabled(true);
                      settings.setAllowFileAccess(true);
                      settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                      settings.setUserAgentString(settings.getUserAgentString() + " TrueSiteSync-Android/1.4.0");
                  }
              }
          }
          JAVAEOF

          # Add network security config for HTTPS
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">supabase.co</domain>
                  <domain includeSubdomains="true">googleapis.com</domain>
                  <domain includeSubdomains="true">github.com</domain>
              </domain-config>
          </network-security-config>
          XMLEOF

          # Reference network security config in manifest
          sed -i 's/android:usesCleartextTraffic="true"/android:usesCleartextTraffic="false" android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/TrueSiteSync.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TrueSiteSync-Android
          path: android/app/build/outputs/apk/debug/TrueSiteSync.apk

      - name: Upload to Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/debug/TrueSiteSync.apk
