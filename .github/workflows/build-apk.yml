name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp app.html www/index.html
          cp -r css www/
          cp -r js www/
          cp -r assets www/

      - name: Install Capacitor
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: Init and add Android
        run: |
          npx cap init "True Site Sync" "com.truesitesync.app" --web-dir www
          npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/TrueSiteSync.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TrueSiteSync-Android
          path: android/app/build/outputs/apk/debug/TrueSiteSync.apk

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/TrueSiteSync.apk
