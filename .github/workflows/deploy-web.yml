name: Mirror to web.truesitesync.com

# Keeps the second GitHub Pages site (web.truesitesync.com) in sync with the
# main site on every push to main, so you never have to maintain two copies.
#
# One-time setup (see WEB_SUBDOMAIN_SETUP.md):
#   1. Create an empty public repo: raghusoftware/truesitesync-web
#   2. Add a Personal Access Token (repo / contents:write) as a secret named
#      WEB_DEPLOY_TOKEN in THIS repo.
#   3. In truesitesync-web -> Settings -> Pages -> Source = branch "gh-pages".
#   4. Add DNS record: CNAME  web  ->  raghusoftware.github.io

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Map the secret into an env var (secrets can't be used directly in `if`).
    env:
      HAS_TOKEN: ${{ secrets.WEB_DEPLOY_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set subdomain CNAME
        run: echo "web.truesitesync.com" > CNAME

      - name: Make the app the entry point for the web subdomain
        # web.truesitesync.com should open the app directly, not the marketing
        # landing. Keep the landing reachable at /home.html just in case.
        run: |
          cp index.html home.html
          cp app.html index.html

      - name: Deploy to truesitesync-web
        if: env.HAS_TOKEN == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          external_repository: raghusoftware/truesitesync-web
          publish_branch: gh-pages
          publish_dir: .
          force_orphan: true
          exclude_assets: '.github,tests,node_modules'
          commit_message: "Sync from truesitesync@${{ github.sha }}"

      - name: Note if token missing
        if: env.HAS_TOKEN != 'true'
        run: echo "WEB_DEPLOY_TOKEN secret not set — skipping mirror. Add it in repo Settings → Secrets and variables → Actions."
