name: Build Android AAB (Play Store)

# Produces a SIGNED Android App Bundle (.aab) for Google Play upload.
#
# Signing key:
#   • If the repo secrets ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
#     ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD are set, the bundle is signed with
#     THAT keystore — use this for real Play Store uploads (the upload key must
#     stay the same across releases).
#   • If they are NOT set, the workflow generates a throwaway keystore so a signed
#     .aab is still produced (fine for a first upload / testing, but Play will
#     reject future updates unless you switch to a stable keystore via secrets).

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-aab:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'truesitesync' }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'truesite' }}
      KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD || 'truesitesync' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp app.html www/index.html
          cp -r css www/
          cp -r js www/
          cp -r assets www/

      - name: Install Capacitor
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/filesystem@6 @capacitor/share@6 @capacitor/app@6 @capacitor/status-bar@6 @codetrix-studio/capacitor-google-auth@3.4.0-rc.4

      - name: Configure native Google Sign-In
        run: |
          if [ -n "${{ secrets.GOOGLE_WEB_CLIENT_ID }}" ]; then
            sed -i "s|GOOGLE_WEB_CLIENT_ID_PLACEHOLDER|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|" capacitor.config.json
            echo "Injected Google Web Client ID for native sign-in."
          else
            echo "::warning::GOOGLE_WEB_CLIENT_ID secret not set — the native account picker will fall back to browser login."
          fi

      - name: Add Android platform
        run: npx cap add android

      - name: Target Android 15 (API 35) — required by Google Play
        run: |
          # Play requires targetSdk >= 35. Capacitor 6 defaults to 34.
          sed -i -E 's/(compileSdkVersion = )[0-9]+/\135/' android/variables.gradle
          sed -i -E 's/(targetSdkVersion = )[0-9]+/\135/' android/variables.gradle
          # AGP 8.2 (Capacitor 6) warns on compileSdk 35 — suppress so the build passes.
          echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
          echo "----- android/variables.gradle -----"; cat android/variables.gradle

      - name: Set version code & name
        run: |
          # Capacitor hardcodes versionCode 1; Play needs it to strictly increase.
          # Derive it from the version so it always climbs with releases:
          #   1.5.63 -> 10563,  1.5.64 -> 10564,  2.0.0 -> 20000
          VN="${GITHUB_REF_NAME#v}"
          if echo "$VN" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            IFS='.' read -r MA MI PA <<< "$VN"
            CODE=$(( MA * 10000 + MI * 100 + PA ))
          else
            VN="1.0.${GITHUB_RUN_NUMBER}"
            CODE=$(( 100000 + GITHUB_RUN_NUMBER ))
          fi
          sed -i -E "s/versionCode [0-9]+/versionCode ${CODE}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${VN}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app launcher icon from logo (assets/icon.png)
        run: |
          npm install --no-save @capacitor/assets@3 || true
          npx @capacitor/assets generate --android \
            --iconBackgroundColor '#ffffff' --iconBackgroundColorDark '#ffffff' || echo "::warning::icon generation failed — falling back to default icon"
          echo "----- generated launcher icons -----"
          find android/app/src/main/res -path '*mipmap*ic_launcher*' | head -20 || true

      - name: Configure Android (in-app links + HTTPS), same as the APK build
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
          mkdir -p android/app/src/main/java/com/truesitesync/app
          cat > android/app/src/main/java/com/truesitesync/app/MainActivity.java << 'JAVAEOF'
          package com.truesitesync.app;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); }
              @Override public void onStart() {
                  super.onStart();
                  WebView webView = getBridge().getWebView();
                  if (webView != null) {
                      WebSettings settings = webView.getSettings();
                      settings.setJavaScriptEnabled(true);
                      settings.setDomStorageEnabled(true);
                      settings.setDatabaseEnabled(true);
                      settings.setAllowFileAccess(true);
                      settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                      settings.setUserAgentString(settings.getUserAgentString() + " TrueSiteSync-Android/1.4.0");
                  }
              }
          }
          JAVAEOF
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors><certificates src="system" /></trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">supabase.co</domain>
                  <domain includeSubdomains="true">googleapis.com</domain>
                  <domain includeSubdomains="true">github.com</domain>
              </domain-config>
          </network-security-config>
          XMLEOF
          sed -i 's/android:usesCleartextTraffic="true"/android:usesCleartextTraffic="false" android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"

      - name: Prepare signing keystore
        working-directory: android/app
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from repository secret (stable / Play-Store ready)."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > upload.keystore
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — generating a throwaway keystore. Fine for a first/test upload, but add a stable keystore secret before publishing updates."
            keytool -genkeypair -v -keystore upload.keystore -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KEY_PASS" \
              -dname "CN=True Site Sync, O=True Site Sync, L=Vadodara, ST=Gujarat, C=IN"
          fi

      - name: Build release bundle (.aab)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign the bundle
        working-directory: android
        run: |
          AAB=app/build/outputs/bundle/release/app-release.aab
          jarsigner -keystore app/upload.keystore -storetype pkcs12 \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            "$AAB" "$KEY_ALIAS"
          cp "$AAB" TrueSiteSync.aab
          jarsigner -verify -verbose "$AAB" | tail -3

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueSiteSync-AAB
          path: android/TrueSiteSync.aab

      - name: Attach AAB to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android/TrueSiteSync.aab
